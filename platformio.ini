[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
upload_speed = 921600

; Build flags for optimization (removed conflicting definitions)
; build_flags = 
;     -DCONFIG_FREERTOS_HZ=1000
;     -DCONFIG_ESP32_DEFAULT_CPU_FREQ_240=y
;     -DCONFIG_ESP32_DEFAULT_CPU_FREQ_MHZ=240

; Monitor configuration
monitor_filters = 
    esp32_exception_decoder
    time

; Upload configuration
upload_port = COM8
; ESP32 detected on COM8 (USB-SERIAL CH340)

; Library dependencies (if using PlatformIO libraries)
; lib_deps = 
;     adafruit/Adafruit SSD1306@^2.5.7
;     adafruit/Adafruit GFX Library@^1.11.5
